name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun test

      - run: bun run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Mirror to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: downloads
        run: |
          # Short cache on meta.js so update checks see new versions quickly;
          # user.js is only fetched after a version bump so it can cache longer.
          bunx wrangler r2 object put "$R2_BUCKET/chatterbox/laplace-chatterbox.user.js" \
            --file dist/laplace-chatterbox.user.js \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=120" \
            --remote
          bunx wrangler r2 object put "$R2_BUCKET/chatterbox/laplace-chatterbox.meta.js" \
            --file dist/laplace-chatterbox.meta.js \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=60" \
            --remote
