name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun test

      - run: bun run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Mirror to Cloudflare R2
        env:
          # R2 bucket-scoped tokens are rejected by the REST route wrangler
          # uses, but work on the S3-compatible API, so upload via aws CLI.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 doesn't support the CRC32 streaming checksums newer aws CLIs
          # send by default.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: downloads
        run: |
          # Short cache on meta.js so update checks see new versions quickly;
          # user.js is only fetched after a version bump so it can cache longer.
          aws s3 cp dist/laplace-chatterbox.user.js "s3://$R2_BUCKET/chatterbox/laplace-chatterbox.user.js" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=120"
          aws s3 cp dist/laplace-chatterbox.meta.js "s3://$R2_BUCKET/chatterbox/laplace-chatterbox.meta.js" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "text/javascript; charset=utf-8" \
            --cache-control "public, max-age=60"
